name: CI Pipeline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Security Audit (SCA)
        run: npm run test:security
      - run: npm run lint
      - run: npm run test:contract
      - run: npm test
