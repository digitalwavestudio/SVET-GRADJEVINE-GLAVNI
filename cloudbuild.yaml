steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--no-cache', '-t', 'gcr.io/$PROJECT_ID/svet-gra-evine:latest', '.']
    
  # 2. Push Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/svet-gra-evine:latest']
    
  # 3. Deploy to Cloud Run (API only - workers will be handled by separate worker service)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'svet-gra-evine'
      - '--image'
      - 'gcr.io/$PROJECT_ID/svet-gra-evine:latest'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--update-env-vars'
      - 'APP_REGION=us-west1,APP_MODE=api,REDIS_URL=${_REDIS_URL}'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'

images:
  - 'gcr.io/$PROJECT_ID/svet-gra-evine:latest'

options:
  logging: CLOUD_LOGGING_ONLY
